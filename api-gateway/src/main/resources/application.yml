server:
  port: 8089

jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTGenerationWithAtLeast32CharactersLong}
  expiration: ${JWT_EXPIRATION:3600000}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: authentication-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**

#        - id: aisymptom-service
#          uri: lb://aisymptom-service
#          predicates:
#            - Path=/api/ai/**
        - id: doctor-service
          uri: lb://doctor-service
          predicates:
              - Path=/doctor/**