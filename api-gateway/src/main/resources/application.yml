server:
  port: 8091


jwt:
  secret: mySecretKeyForJWTGenerationWithAtLeast32CharactersLong
  expiration: 3600000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8098/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: authentication-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**
        - id: aisymptom-service
          uri: lb://aisymptom-service
          predicates:
            - Path=/api/ai/**