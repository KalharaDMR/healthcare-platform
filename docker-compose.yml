version: '3.8'

services:

  postgres:
    image: postgres:17
    container_name: postgres-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Ramesh123
      POSTGRES_DB: postgres
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data  #for data persistency
    networks:
      - healthcare-net

  # Eureka Server
  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"
    environment:
      - EUREKA_INSTANCE_HOSTNAME=eureka-server
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - postgres
    networks:
      - healthcare-net

  # Authentication Service
  auth-service:
    build: ./authentication-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/auth_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Ramesh123
      - JWT_SECRET=mySecretKeyForJWTGenerationWithAtLeast32CharactersLong
      - JWT_EXPIRATION=3600000
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - postgres
      - eureka-server
    networks:
      - healthcare-net

  # Admin Service
  admin-service:
    build: ./admin-service
    ports:
      - "8088:8088"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/admin_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Ramesh123
      - INTERNAL_API_KEY=your-secret-internal-key
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - postgres
      - eureka-server
    networks:
      - healthcare-net

  # API Gateway
  api-gateway:
    build: ./api-gateway
    ports:
      - "8089:8089"
    environment:
      - JWT_SECRET=mySecretKeyForJWTGenerationWithAtLeast32CharactersLong
      - JWT_EXPIRATION=3600000
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - auth-service
      - admin-service
      - eureka-server
    networks:
      - healthcare-net

  # AI Symptom Service
  aisymptom-service:
    image: 2002rusira/aisymptomservice:v2
    ports:
      - "8098:8098"
    environment:
      - PORT=8098
      - INTERNAL_API_KEY=your-secret-internal-key
      - GEMINI_KEY=AIzaSyDoEwx8LaiED2SVuhQPNo9gOVXrZGY9NJM
      - EUREKA_SERVER=http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
      - api-gateway
    networks:
      - healthcare-net

  # Doctor Service
  doctor-service:
    build: ./doctor-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/doctor_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Ramesh123
      - INTERNAL_API_KEY=your-secret-internal-key
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - postgres
      - eureka-server
    networks:
      - healthcare-net

networks:
  healthcare-net:
    driver: bridge