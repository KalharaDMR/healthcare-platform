apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthcare-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: healthcare.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8089