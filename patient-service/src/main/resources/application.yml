server:
  port: 8082

spring:
  application:
    name: patient-service

  datasource:
    url: jdbc:postgresql://localhost:5432/patient_service
    username: postgres
    password: Sarala31!
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  # Upload folder configuration
  file:
    upload-dir: uploads   # <-- change this if you want an absolute path, e.g., C:/Users/saral/uploads

management:
  endpoints:
    web:
      exposure:
        include: "*"

# ==========================
# Eureka Client Configuration
# ==========================
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/  # URL of your Eureka Server
  instance:
    prefer-ip-address: true