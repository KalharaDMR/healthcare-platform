server:
  port: 8083

spring:
  application:
    name: doctor-service

  datasource:
    url: jdbc:postgresql://localhost:5432/doctor_db
    username: doctor_user
    password: doctor123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

internal:
  api:
    key: your-secret-internal-key

services:
  auth:
    url: http://localhost:8081
    internal-key: your-secret-internal-key

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true